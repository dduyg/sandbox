<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaporwave Title Database</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a12;
            color: #e0e0ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .vapor-gradient {
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="app" class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-5xl font-bold mb-4 vapor-gradient">ＡＥＳＴＨＥＴＩＣ ＤＢ</h1>
            <p class="text-gray-400 text-lg">Vaporwave Project Title Generator & Explorer</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12 bg-gray-900 p-6 rounded-xl border border-gray-800">
            <div class="md:col-span-4">
                <input v-model="searchQuery" type="text" placeholder="Search titles or tags..." 
                    class="w-full bg-black border border-gray-700 p-3 rounded text-white focus:outline-none focus:border-cyan-400">
            </div>

            <div>
                <label class="block text-xs uppercase tracking-widest text-cyan-400 mb-2 font-bold">Category</label>
                <select v-model="filters.category" class="w-full bg-black border border-gray-700 p-2 rounded">
                    <option value="">All Categories</option>
                    <option v-for="opt in options.categories" :value="opt">{{opt}}</option>
                </select>
            </div>

            <div>
                <label class="block text-xs uppercase tracking-widest text-pink-500 mb-2 font-bold">Mood</label>
                <select v-model="filters.mood" class="w-full bg-black border border-gray-700 p-2 rounded">
                    <option value="">All Moods</option>
                    <option v-for="opt in options.moods" :value="opt">{{opt}}</option>
                </select>
            </div>

            <div>
                <label class="block text-xs uppercase tracking-widest text-purple-400 mb-2 font-bold">Style</label>
                <select v-model="filters.style" class="w-full bg-black border border-gray-700 p-2 rounded">
                    <option value="">All Styles</option>
                    <option v-for="opt in options.styles" :value="opt">{{opt}}</option>
                </select>
            </div>

            <div>
                <label class="block text-xs uppercase tracking-widest text-yellow-400 mb-2 font-bold">Length</label>
                <select v-model="filters.length" class="w-full bg-black border border-gray-700 p-2 rounded">
                    <option value="">Any Length</option>
                    <option value="Short">Short (1-2 words)</option>
                    <option value="Medium">Medium (2-3 words)</option>
                    <option value="Long">Long (4+ words)</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div v-for="item in filteredTitles" :key="item.id" class="card p-6 rounded-lg">
                <h3 class="text-xl font-bold text-white mb-2">{{ item.title }}</h3>
                <div class="flex flex-wrap gap-2 mb-4">
                    <span class="text-[10px] px-2 py-1 bg-gray-800 rounded text-gray-300 uppercase tracking-tighter">{{ item.category }}</span>
                    <span class="text-[10px] px-2 py-1 bg-pink-900/30 rounded text-pink-300 uppercase tracking-tighter">{{ item.mood }}</span>
                </div>
                <div class="flex flex-wrap gap-1">
                    <span v-for="tag in item.tags" class="text-xs text-cyan-400">#{{ tag }}</span>
                </div>
            </div>
        </div>

        <div v-if="filteredTitles.length === 0" class="text-center py-20 text-gray-500">
            No aesthetic matches found. Try clearing your filters.
        </div>
    </div>

    <script>
        const { createApp, ref, computed, reactive } = Vue;

        createApp({
            setup() {
                const searchQuery = ref('');
                const filters = reactive({
                    category: '',
                    mood: '',
                    style: '',
                    length: ''
                });

                // YOUR DATABASE
                const titles = ref([
                    { id: 1, title: "Synthetic Entrance", category: "Institutional", mood: "Mysterious", style: "Formal", length: "Short", tags: ["cyber", "liminal"] },
                    { id: 2, title: "Cherry Cola Skies", category: "Atmospheric", mood: "Dreamy", style: "Creative", length: "Short", tags: ["retro", "nostalgia"] },
                    { id: 3, title: "Counting Constellations", category: "Creative", mood: "Melancholic", style: "Casual", length: "Medium", tags: ["space", "calm"] },
                    { id: 4, title: "C0d3r's Paradox", category: "Technical", mood: "Analytical", style: "Professional", length: "Medium", tags: ["code", "glitch"] },
                    { id: 5, title: "Marble Pillar Archive", category: "Institutional", mood: "Mysterious", style: "Formal", length: "Medium", tags: ["museum", "statue"] },
                    { id: 6, title: "Virtual Plaza Sundown", category: "Atmospheric", mood: "Energetic", style: "Creative", length: "Medium", tags: ["mallsoft", "sunset"] }
                ]);

                const options = {
                    categories: ["Technical", "Atmospheric", "Institutional", "Creative"],
                    moods: ["Mysterious", "Analytical", "Energetic", "Melancholic", "Dreamy"],
                    styles: ["Formal", "Casual", "Creative", "Professional"]
                };

                const filteredTitles = computed(() => {
                    return titles.value.filter(item => {
                        const matchesSearch = item.title.toLowerCase().includes(searchQuery.value.toLowerCase()) || 
                                            item.tags.some(t => t.includes(searchQuery.value.toLowerCase()));
                        const matchesCat = !filters.category || item.category === filters.category;
                        const matchesMood = !filters.mood || item.mood === filters.mood;
                        const matchesStyle = !filters.style || item.style === filters.style;
                        const matchesLen = !filters.length || item.length === filters.length;
                        
                        return matchesSearch && matchesCat && matchesMood && matchesStyle && matchesLen;
                    });
                });

                return { titles, searchQuery, filters, options, filteredTitles };
            }
        }).mount('#app');
    </script>
</body>
</html>
