<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ＶＡＰＯＲ ＬＥＸＩＣＯＮ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --bg2: #0f0f1a;
    --bg3: #14142a;
    --pink: #ff6ec7;
    --cyan: #00e5ff;
    --purple: #b44fff;
    --lavender: #c8b4ff;
    --yellow: #ffe66d;
    --dim: rgba(255,255,255,0.07);
    --dim2: rgba(255,255,255,0.04);
    --border: rgba(200,180,255,0.15);
    --text: #e8e0ff;
    --muted: rgba(232,224,255,0.45);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* grid bg */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(180,79,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,79,255,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 24px; }

  /* ── HEADER ── */
  header {
    padding: 48px 0 32px;
    text-align: center;
    position: relative;
  }

  .header-glow {
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 600px; height: 200px;
    background: radial-gradient(ellipse, rgba(180,79,255,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 4rem);
    font-weight: 700;
    letter-spacing: 0.25em;
    background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 40%, var(--cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .logo-sub {
    font-size: 0.65rem;
    letter-spacing: 0.5em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── SEARCH ── */
  .search-bar {
    max-width: 640px;
    margin: 32px auto 0;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    padding: 14px 50px 14px 18px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--purple); }
  .search-bar input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    right: 16px; top: 50%; transform: translateY(-50%);
    color: var(--muted);
    font-size: 1.1rem;
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  .main-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
    margin-top: 32px;
    padding-bottom: 60px;
  }

  @media (max-width: 900px) {
    .main-layout { grid-template-columns: 1fr; }
    .sidebar { order: -1; }
  }

  /* ── SIDEBAR ── */
  .sidebar { display: flex; flex-direction: column; gap: 16px; }

  .filter-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .filter-title {
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .filter-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .filter-group { margin-bottom: 18px; }
  .filter-group:last-child { margin-bottom: 0; }
  .filter-label {
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }

  .filter-chips { display: flex; flex-wrap: wrap; gap: 6px; }

  .chip {
    background: var(--dim2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    user-select: none;
  }
  .chip:hover { border-color: var(--purple); color: var(--lavender); }
  .chip.active { background: rgba(180,79,255,0.18); border-color: var(--purple); color: var(--purple); }

  .sort-select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    padding: 8px 10px;
    outline: none;
    cursor: pointer;
  }
  .sort-select option { background: var(--bg3); }

  .clear-btn {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(255,110,199,0.25);
    border-radius: 4px;
    color: var(--pink);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    padding: 8px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .clear-btn:hover { background: rgba(255,110,199,0.1); border-color: var(--pink); }

  /* ── AI PANEL ── */
  .ai-panel {
    background: linear-gradient(135deg, rgba(180,79,255,0.08), rgba(0,229,255,0.05));
    border: 1px solid rgba(180,79,255,0.3);
    border-radius: 10px;
    padding: 20px;
  }

  .ai-title {
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 12px;
  }

  .ai-prompt {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    padding: 10px;
    outline: none;
    resize: vertical;
    min-height: 70px;
    margin-bottom: 10px;
  }
  .ai-prompt::placeholder { color: var(--muted); }
  .ai-prompt:focus { border-color: var(--cyan); }

  .ai-generate-btn {
    width: 100%;
    background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(180,79,255,0.15));
    border: 1px solid var(--cyan);
    border-radius: 4px;
    color: var(--cyan);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    padding: 10px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .ai-generate-btn:hover { background: linear-gradient(135deg, rgba(0,229,255,0.25), rgba(180,79,255,0.25)); }
  .ai-generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .ai-status {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 8px;
    min-height: 16px;
    text-align: center;
  }
  .ai-status.loading { color: var(--cyan); }
  .ai-status.error { color: var(--pink); }

  /* ── ADD FORM ── */
  .add-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .add-form-inner { display: flex; flex-direction: column; gap: 10px; }

  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--purple); }
  .form-input::placeholder { color: var(--muted); }

  .form-select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    padding: 8px 10px;
    outline: none;
    cursor: pointer;
  }
  .form-select option { background: var(--bg3); }

  .add-btn {
    background: rgba(180,79,255,0.2);
    border: 1px solid var(--purple);
    border-radius: 4px;
    color: var(--purple);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    padding: 9px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .add-btn:hover { background: rgba(180,79,255,0.35); }

  /* ── MAIN CONTENT ── */
  .content-area {}

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .result-count {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }
  .result-count span { color: var(--purple); }

  .view-toggle { display: flex; gap: 6px; }
  .view-btn {
    background: var(--dim2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-btn.active { border-color: var(--purple); color: var(--purple); background: rgba(180,79,255,0.1); }

  /* ── CARDS GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .cards-grid.list-view {
    grid-template-columns: 1fr;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(180,79,255,0.06));
    pointer-events: none;
  }
  .card:hover {
    border-color: rgba(180,79,255,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(180,79,255,0.12);
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }

  .badge {
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
  }
  .badge-category { background: rgba(255,110,199,0.12); color: var(--pink); border: 1px solid rgba(255,110,199,0.2); }
  .badge-mood { background: rgba(0,229,255,0.1); color: var(--cyan); border: 1px solid rgba(0,229,255,0.2); }
  .badge-style { background: rgba(180,79,255,0.1); color: var(--lavender); border: 1px solid rgba(180,79,255,0.2); }
  .badge-length { background: rgba(255,230,109,0.08); color: var(--yellow); border: 1px solid rgba(255,230,109,0.15); }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .tag {
    font-size: 0.58rem;
    color: var(--muted);
    background: var(--dim);
    border-radius: 2px;
    padding: 2px 6px;
  }
  .tag::before { content: '#'; opacity: 0.6; }

  .card-copy {
    position: absolute;
    top: 12px; right: 12px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 0.9rem;
    cursor: pointer;
    opacity: 0;
    transition: all 0.15s;
    padding: 4px;
    border-radius: 3px;
  }
  .card:hover .card-copy { opacity: 1; }
  .card-copy:hover { color: var(--cyan); background: var(--dim); }

  .card-delete {
    position: absolute;
    bottom: 12px; right: 12px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 0.8rem;
    cursor: pointer;
    opacity: 0;
    transition: all 0.15s;
    padding: 4px;
    border-radius: 3px;
  }
  .card:hover .card-delete { opacity: 0.5; }
  .card-delete:hover { opacity: 1 !important; color: var(--pink); }

  /* list view */
  .cards-grid.list-view .card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
  }
  .cards-grid.list-view .card-name { margin-bottom: 0; font-size: 0.95rem; flex: 0 0 220px; }
  .cards-grid.list-view .card-meta { margin-bottom: 0; flex: 1; }
  .cards-grid.list-view .card-tags { flex: 0 0 auto; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 0.8rem; letter-spacing: 0.1em; }

  /* ── AI RESULTS ── */
  .ai-results {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ai-result-item {
    background: rgba(0,229,255,0.05);
    border: 1px solid rgba(0,229,255,0.15);
    border-radius: 4px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .ai-result-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    color: var(--text);
    flex: 1;
  }

  .ai-add-btn {
    background: transparent;
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 3px;
    color: var(--cyan);
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    padding: 4px 8px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .ai-add-btn:hover { background: rgba(0,229,255,0.15); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--bg3);
    border: 1px solid var(--purple);
    border-radius: 6px;
    padding: 12px 18px;
    font-size: 0.72rem;
    color: var(--lavender);
    letter-spacing: 0.05em;
    z-index: 9998;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.25s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(180,79,255,0.3); border-radius: 3px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-glow"></div>
    <div class="logo">ＶＡＰＯＲ ＬＥＸＩＣＯＮ</div>
    <div class="logo-sub">a vaporwave name database &amp; generator</div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="search titles, tags, moods…" />
      <span class="search-icon">⌕</span>
    </div>
  </header>

  <div class="main-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- FILTERS -->
      <div class="filter-panel">
        <div class="filter-title">Filters</div>

        <div class="filter-group">
          <span class="filter-label">Category</span>
          <div class="filter-chips" id="catChips"></div>
        </div>

        <div class="filter-group">
          <span class="filter-label">Mood</span>
          <div class="filter-chips" id="moodChips"></div>
        </div>

        <div class="filter-group">
          <span class="filter-label">Style</span>
          <div class="filter-chips" id="styleChips"></div>
        </div>

        <div class="filter-group">
          <span class="filter-label">Length</span>
          <div class="filter-chips" id="lengthChips"></div>
        </div>

        <div class="filter-group">
          <span class="filter-label">Sort by</span>
          <select class="sort-select" id="sortSelect">
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
            <option value="length-asc">Shortest first</option>
            <option value="length-desc">Longest first</option>
            <option value="newest">Newest first</option>
          </select>
        </div>

        <button class="clear-btn" id="clearBtn">✕ clear all filters</button>
      </div>

      <!-- AI GENERATOR -->
      <div class="ai-panel">
        <div class="ai-title">// AI GENERATOR</div>
        <textarea class="ai-prompt" id="aiPrompt" placeholder="describe a vibe, theme, or aesthetic… e.g. 'melancholic late-night city drives' or 'retro tech nostalgia'"></textarea>
        <button class="ai-generate-btn" id="aiGenerateBtn" onclick="generateAI()">⟡ generate titles</button>
        <div class="ai-status" id="aiStatus"></div>
        <div class="ai-results" id="aiResults"></div>
      </div>

      <!-- ADD ENTRY -->
      <div class="add-panel">
        <div class="filter-title">Add Entry</div>
        <div class="add-form-inner">
          <input class="form-input" id="addName" type="text" placeholder="title name…" />
          <div class="form-row">
            <select class="form-select" id="addCategory">
              <option value="">category…</option>
            </select>
            <select class="form-select" id="addMood">
              <option value="">mood…</option>
            </select>
          </div>
          <div class="form-row">
            <select class="form-select" id="addStyle">
              <option value="">style…</option>
            </select>
            <select class="form-select" id="addLength" disabled>
              <option value="">auto-length</option>
            </select>
          </div>
          <input class="form-input" id="addTags" type="text" placeholder="tags: cyber, retro, neon…" />
          <button class="add-btn" onclick="addEntry()">+ add to lexicon</button>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content-area">
      <div class="toolbar">
        <div class="result-count" id="resultCount"></div>
        <div class="view-toggle">
          <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Grid view">⊞</button>
          <button class="view-btn" id="listBtn" onclick="setView('list')" title="List view">☰</button>
        </div>
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══ DATA ═══

function getLength(name) {
  const words = name.trim().split(/\s+/).length;
  if (words <= 2) return 'Short (1-2)';
  if (words === 3) return 'Medium (3)';
  return 'Long (4+)';
}

  { id: 10, name: 'Glass Horizon', category: 'Atmospheric', mood: 'Liminal', style: 'Poetic', tags: ['glass', 'sky', 'future'] },
  { id: 11, name: 'Café Simulation', category: 'Institutional', mood: 'Nostalgic', style: 'Casual', tags: ['café', 'lofi', 'cozy'] },
  { id: 12, name: 'Forgotten Data', category: 'Technical', mood: 'Melancholic', style: 'Glitch', tags: ['memory', 'lost', 'digital'] },
  { id: 13, name: 'Eternal Beta', category: 'Technical', mood: 'Tense', style: 'Casual', tags: ['software', 'loop', 'tech'] },
  { id: 14, name: 'Crystalline Latency', category: 'Technical', mood: 'Serene', style: 'Professional', tags: ['network', 'crystal', 'delay'] },
  { id: 15, name: 'Phantom Signal', category: 'Atmospheric', mood: 'Mysterious', style: 'Creative', tags: ['ghost', 'radio', 'signal'] },
  { id: 16, name: 'Solar Collapse', category: 'Nature', mood: 'Energetic', style: 'Poetic', tags: ['space', 'sun', 'dramatic'] },
  { id: 17, name: 'Infinite Checkout', category: 'Institutional', mood: 'Liminal', style: 'Casual', tags: ['liminal', 'mundane', 'surreal'] },
  { id: 18, name: 'Velvet Algorithm', category: 'Technical', mood: 'Dreamy', style: 'Creative', tags: ['soft', 'code', 'luxury'] },
  { id: 19, name: 'Midnight Database', category: 'Technical', mood: 'Mysterious', style: 'Professional', tags: ['night', 'data', 'dark'] },
  { id: 20, name: 'Sakura Protocol', category: 'Nature', mood: 'Melancholic', style: 'Formal', tags: ['japanese', 'spring', 'protocol'] },
  { id: 21, name: 'Haze Engine', category: 'Technical', mood: 'Dreamy', style: 'Glitch', tags: ['fog', 'engine', 'distortion'] },
  { id: 22, name: 'Borrowed Sunsets', category: 'Atmospheric', mood: 'Nostalgic', style: 'Poetic', tags: ['sunset', 'memory', 'soft'] },
  { id: 23, name: 'Club Oblivion', category: 'Spatial', mood: 'Liminal', style: 'Creative', tags: ['night', 'void', 'dance'] },
  { id: 24, name: 'Hyper Pastoral', category: 'Nature', mood: 'Euphoric', style: 'Creative', tags: ['nature', 'hyper', 'surreal'] },
].map(d => ({ ...d, length: getLength(d.name), id: d.id }));

let nextId = db.length + 1;

// ── FILTERS STATE ──
let filters = { category: null, mood: null, style: null, length: null };
let currentView = 'grid';

// ══ INIT ══
document.addEventListener('DOMContentLoaded', () => {
  buildChips('catChips', CATEGORIES, 'category');
  buildChips('moodChips', MOODS, 'mood');
  buildChips('styleChips', STYLES, 'style');
  buildChips('lengthChips', LENGTHS, 'length');
  populateFormSelects();
  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('sortSelect').addEventListener('change', render);
  document.getElementById('clearBtn').addEventListener('click', clearFilters);
  render();
});

function buildChips(containerId, options, filterKey) {
  const el = document.getElementById(containerId);
  options.forEach(opt => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = opt;
    chip.onclick = () => toggleFilter(filterKey, opt, chip);
    el.appendChild(chip);
  });
}

function toggleFilter(key, value, chipEl) {
  if (filters[key] === value) {
    filters[key] = null;
    chipEl.classList.remove('active');
  } else {
    // deactivate siblings
    const siblings = chipEl.parentElement.querySelectorAll('.chip');
    siblings.forEach(s => s.classList.remove('active'));
    filters[key] = value;
    chipEl.classList.add('active');
  }
  render();
}

function clearFilters() {
  filters = { category: null, mood: null, style: null, length: null };
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('searchInput').value = '';
  render();
}

function populateFormSelects() {
  const catSel = document.getElementById('addCategory');
  const moodSel = document.getElementById('addMood');
  const styleSel = document.getElementById('addStyle');
  CATEGORIES.forEach(c => catSel.add(new Option(c, c)));
  MOODS.forEach(m => moodSel.add(new Option(m, m)));
  STYLES.forEach(s => styleSel.add(new Option(s, s)));
}

// ══ RENDER ══
function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  let results = db.filter(d => {
    if (filters.category && d.category !== filters.category) return false;
    if (filters.mood && d.mood !== filters.mood) return false;
    if (filters.style && d.style !== filters.style) return false;
    if (filters.length && d.length !== filters.length) return false;
    if (q) {
      const searchable = [d.name, d.category, d.mood, d.style, ...d.tags].join(' ').toLowerCase();
      if (!searchable.includes(q)) return false;
    }
    return true;
  });

  results.sort((a, b) => {
    if (sort === 'az') return a.name.localeCompare(b.name);
    if (sort === 'za') return b.name.localeCompare(a.name);
    if (sort === 'length-asc') return a.name.length - b.name.length;
    if (sort === 'length-desc') return b.name.length - a.name.length;
    if (sort === 'newest') return b.id - a.id;
    return 0;
  });

  return results;
}

function render() {
  const results = getFiltered();
  const grid = document.getElementById('cardsGrid');
  const countEl = document.getElementById('resultCount');

  countEl.innerHTML = `<span>${results.length}</span> / ${db.length} titles`;

  if (results.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">◈</div>
      <p>no titles match your filters</p>
    </div>`;
    return;
  }

  grid.innerHTML = results.map(d => `
    <div class="card" title="click to copy">
      <button class="card-copy" onclick="copyTitle(event,'${d.name.replace(/'/,"\\'")}')">⎘</button>
      <div class="card-name">${highlight(d.name)}</div>
      <div class="card-meta">
        <span class="badge badge-category">${d.category}</span>
        <span class="badge badge-mood">${d.mood}</span>
        <span class="badge badge-style">${d.style}</span>
        <span class="badge badge-length">${d.length}</span>
      </div>
      <div class="card-tags">${d.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <button class="card-delete" onclick="deleteEntry(event,${d.id})">✕</button>
    </div>
  `).join('');
}

function highlight(text) {
  const q = document.getElementById('searchInput').value;
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark style="background:rgba(180,79,255,0.3);color:inherit;border-radius:2px;">$1</mark>');
}

function setView(v) {
  currentView = v;
  const grid = document.getElementById('cardsGrid');
  grid.classList.toggle('list-view', v === 'list');
  document.getElementById('gridBtn').classList.toggle('active', v === 'grid');
  document.getElementById('listBtn').classList.toggle('active', v === 'list');
}

// ══ COPY ══
function copyTitle(e, name) {
  e.stopPropagation();
  navigator.clipboard.writeText(name).then(() => toast(`Copied: ${name}`));
}

// ══ DELETE ══
function deleteEntry(e, id) {
  e.stopPropagation();
  db = db.filter(d => d.id !== id);
  render();
}

// ══ ADD ══
function addEntry() {
  const name = document.getElementById('addName').value.trim();
  if (!name) { toast('Enter a title name'); return; }

  const entry = {
    id: nextId++,
    name,
    category: document.getElementById('addCategory').value || 'Creative',
    mood: document.getElementById('addMood').value || 'Mysterious',
    style: document.getElementById('addStyle').value || 'Creative',
    length: getLength(name),
    tags: document.getElementById('addTags').value.split(',').map(t => t.trim().toLowerCase().replace(/\s+/g,'_')).filter(Boolean),
  };

  db.unshift(entry);
  document.getElementById('addName').value = '';
  document.getElementById('addTags').value = '';
  document.getElementById('addCategory').value = '';
  document.getElementById('addMood').value = '';
  document.getElementById('addStyle').value = '';

  // switch sort to newest
  document.getElementById('sortSelect').value = 'newest';
  render();
  toast(`✦ "${name}" added to lexicon`);
}

// ══ AI GENERATOR ══
async function generateAI() {
  const prompt = document.getElementById('aiPrompt').value.trim();
  if (!prompt) { toast('Describe a vibe first'); return; }

  const btn = document.getElementById('aiGenerateBtn');
  const status = document.getElementById('aiStatus');
  const resultsEl = document.getElementById('aiResults');

  btn.disabled = true;
  status.className = 'ai-status loading';
  status.textContent = '⟳ generating…';
  resultsEl.innerHTML = '';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a vaporwave naming expert. Generate creative vaporwave-aesthetic project/title names. 
Respond ONLY with a JSON array of objects. No preamble, no markdown, no backticks.
Each object has: name (string), category (one of: Technical,Atmospheric,Institutional,Creative,Temporal,Spatial,Cyberpunk,Nature), mood (one of: Mysterious,Analytical,Energetic,Melancholic,Dreamy,Nostalgic,Tense,Euphoric,Liminal,Serene), style (one of: Formal,Casual,Creative,Professional,Poetic,Glitch), tags (array of 2-4 lowercase strings).
Generate exactly 6 names. They should feel authentic to vaporwave aesthetics: nostalgic, slightly corporate, dreamlike, digital-analog hybrid.`,
        messages: [{ role: 'user', content: `Generate vaporwave titles inspired by this vibe: ${prompt}` }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const generated = JSON.parse(clean);

    status.className = 'ai-status';
    status.textContent = `✦ ${generated.length} titles generated`;

    resultsEl.innerHTML = generated.map((item, i) => `
      <div class="ai-result-item">
        <span class="ai-result-name">${item.name}</span>
        <button class="ai-add-btn" onclick='addAIEntry(${JSON.stringify(item).replace(/'/g,"&#39;")})'>+ add</button>
      </div>
    `).join('');

  } catch (err) {
    status.className = 'ai-status error';
    status.textContent = '⚠ generation failed — try again';
    console.error(err);
  }

  btn.disabled = false;
}

function addAIEntry(item) {
  const entry = {
    id: nextId++,
    name: item.name,
    category: item.category || 'Creative',
    mood: item.mood || 'Mysterious',
    style: item.style || 'Creative',
    length: getLength(item.name),
    tags: item.tags || [],
  };
  db.unshift(entry);
  document.getElementById('sortSelect').value = 'newest';
  render();
  toast(`✦ "${item.name}" added`);
}

// ══ TOAST ══
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
